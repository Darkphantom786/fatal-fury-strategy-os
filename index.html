<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fatal Fury Strategy OS</title>

<link rel="stylesheet" href="css/style.css">

    
</head>

<body>

<header class="header">

    <h1>Fatal Fury Strategy OS</h1>

    <p>Frame Data • Combos • Matchups • Punishes</p>

</header>

<main class="container">

    <div id="character-info">
    Loading Character Data...
</div>

<div id="moves-container">
</div>
<div class="engine-box">

    <h2>Frame Kill Route Generator</h2>

    <input
        type="number"
        id="knockdownFrames"
        placeholder="Enter Knockdown Frames">

    <button id="frameKillButton">

        Generate Route

    </button>

    <div id="frameKillResults"
         class="result-box">

        Waiting For Input...

    </div>
<div class="engine-box">

    <h2>Dynamic Meaty Engine</h2>

    <input
        type="number"
        id="normalAdvantage"
        placeholder="Normal Hit Advantage">

    <input
        type="number"
        id="activeShift"
        placeholder="Active Frame Shift">

    <button id="meatyButton">

        Calculate Meaty

    </button>

    <div
        id="meatyResults"
        class="result-box">

        Waiting For Input...

    </div>

</div>
</div>
</main>

<script src="js/database.js"></script>
<script src="js/moves.js"></script>
<script src="js/framekill.js"></script>
<script src="js/meaty.js"></script>
<script src="js/app.js"></script>

</body>
</html>
