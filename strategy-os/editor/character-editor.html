<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Strategy OS - Universal Character Editor</title>

<style>

body{

background:#111;

color:white;

font-family:Arial,Helvetica,sans-serif;

margin:40px;

}

.container{

max-width:1200px;

margin:auto;

}

h1{

margin-bottom:30px;

}

select{

padding:10px;

font-size:16px;

width:300px;

}

.card{

margin-top:30px;

background:#1b1b1b;

padding:20px;

border-radius:10px;

}

pre{

white-space:pre-wrap;

font-size:14px;

}

</style>

</head>

<body>

<div class="container">

<h1>Strategy OS - Universal Character Editor</h1>

<label>Select Character</label>

<br><br>

<select id="characterSelect">

<option value="">Choose Character</option>

<option value="marco">Marco</option>

</select>

<div class="card">

<h2>Character Data</h2>

<pre id="output">

No Character Loaded

</pre>

</div>

</div>

<script type="module">

import databaseEngine from "../core/database-engine.js";

await databaseEngine.initialize();

const select=document.getElementById("characterSelect");

const output=document.getElementById("output");

select.addEventListener("change",()=>{

const character=databaseEngine.getCharacter(select.value);

output.textContent=JSON.stringify(character,null,4);

});

</script>

</body>

</html>
